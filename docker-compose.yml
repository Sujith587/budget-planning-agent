version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: budget-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./budget-ledger-backend
    container_name: budget-backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/budget_ledger
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb

  frontend:
    build: ./budget-ledger-react
    container_name: budget-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
